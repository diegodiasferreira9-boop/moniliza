<style>
:root{--blue:#0057B7;--blue-d:#003d82;--blue-l:#e8f0fb;--yellow:#FFD700;--yellow-d:#e6c200;--yellow-l:#fffbe6;
  --green:#228B22;--red:#ef4444;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;
  --g600:#4b5563;--g700:#374151;--g800:#1f2937;--sw:265px;--th:60px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--g100);color:var(--g800);overflow-x:hidden}

/* ===== AUTENTICAÇÃO ===== */
.auth{display:none;min-height:100vh;background:linear-gradient(135deg,var(--blue-d),var(--blue),#1a3a7a);align-items:center;justify-content:center;padding:20px}
.auth.on{display:flex}
.acard{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.alogo{text-align:center;margin-bottom:26px}
.alogo-icon{width:66px;height:66px;background:linear-gradient(135deg,var(--yellow),var(--yellow-d));border-radius:17px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:9px;box-shadow:0 6px 20px rgba(255,215,0,.35)}
.alogo-icon i{font-size:29px;color:var(--blue)}
.alogo h1{font-size:20px;font-weight:800;color:var(--blue)}
.alogo p{font-size:12px;color:var(--g400);margin-top:3px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--g700);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{width:100%;padding:11px 14px;border:2px solid var(--g200);border-radius:10px;font-size:14px;outline:none;background:var(--g50);transition:border-color .2s,box-shadow .2s;color:var(--g800)}
.fg input:focus,.fg select:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,87,183,.1)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-d));color:#fff}
.btn-blue:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,87,183,.4)}
.btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(34,197,94,.4)}
.btn-orange{background:linear-gradient(135deg,#ff9500,#ff7200);color:#fff}
.btn-orange:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(255,149,0,.4)}
.btn-danger{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(239,68,68,.4)}
.btn:active{transform:scale(.98)}

/* ===== APP PRINCIPAL ===== */
.app{display:none;min-height:100vh}
.app.on{display:flex}
.sidebar{width:var(--sw);background:#fff;border-right:1px solid var(--g200);overflow-y:auto;flex-shrink:0}
.sidebar-head{padding:20px;border-bottom:1px solid var(--g200)}
.slogo{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.slogo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--yellow),var(--yellow-d));border-radius:10px;display:flex;align-items:center;justify-content:center}
.slogo-icon i{font-size:24px;color:var(--blue)}
.slogo-text h2{font-size:14px;font-weight:800;color:var(--blue)}
.slogo-text p{font-size:11px;color:var(--g400);margin-top:2px}
.user-card{background:var(--blue-l);border-radius:10px;padding:12px;margin-top:15px}
.user-role{font-size:10px;color:var(--blue);text-transform:uppercase;font-weight:700}
.user-name{font-size:12px;font-weight:700;color:var(--g800);margin-top:4px}
.user-status{font-size:10px;color:var(--g400);margin-top:3px}
.sidebar-nav{padding:15px 0}
.nav-item{padding:12px 15px;font-size:13px;font-weight:600;color:var(--g700);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
.nav-item:hover{background:var(--g50);color:var(--blue)}
.nav-item.active{background:var(--blue-l);color:var(--blue);border-left-color:var(--blue)}
.nav-item i{font-size:14px;width:20px}

/* ===== CONTEÚDO ===== */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{background:#fff;border-bottom:1px solid var(--g200);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;height:var(--th)}
.header-left{font-size:18px;font-weight:700;color:var(--g800)}
.header-right{display:flex;gap:10px;align-items:center}
.btn-logout{padding:8px 16px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-logout:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(239,68,68,.3)}
.main{flex:1;overflow-y:auto;padding:20px}

/* ===== CARDS ===== */
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--g200);margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h3{font-size:16px;font-weight:700;color:var(--g800);margin-bottom:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card h3 i{color:var(--blue);font-size:18px}

/* ===== FORMULÁRIOS ===== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:15px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:12px;font-weight:700;color:var(--g700);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:2px solid var(--g200);border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border-color .2s,box-shadow .2s;color:var(--g800);font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,87,183,.1)}
.form-group textarea{resize:vertical;min-height:80px}

/* ===== CÂMERA ===== */
.camera-section{border:2px dashed var(--blue);border-radius:12px;padding:15px;margin:15px 0;background:var(--blue-l)}
.camera-preview{width:100%;max-width:300px;border-radius:8px;margin:10px 0;display:block}
video{width:100%;max-width:300px;border-radius:8px;margin:10px 0;display:block}

/* ===== MODAIS ===== */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-content{background:#fff;border-radius:15px;padding:30px;width:100%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{font-size:18px;font-weight:700;color:var(--g800);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--g400);transition:color .2s}
.modal-close:hover{color:var(--g800)}

/* ===== TABELAS ===== */
.table{width:100%;border-collapse:collapse;font-size:13px}
.table thead{background:var(--g50)}
.table th{padding:10px;text-align:left;font-weight:700;color:var(--g700);border-bottom:2px solid var(--g200)}
.table td{padding:10px;border-bottom:1px solid var(--g200);color:var(--g800)}
.table tr:hover{background:var(--g50)}
.table-actions{display:flex;gap:5px}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px;border:none;cursor:pointer;transition:all .2s}
.btn-sm-danger{background:var(--red);color:#fff}
.btn-sm-danger:hover{background:#dc2626;transform:translateY(-1px)}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:20px;text-align:center}
.stat-icon{font-size:32px;margin-bottom:10px}
.stat-label{font-size:12px;color:var(--g600);margin-bottom:8px;text-transform:uppercase;font-weight:700;letter-spacing:.3px}
.stat-value{font-size:32px;font-weight:800;color:var(--blue)}

/* ===== GRÁFICOS ===== */
.chart-container{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--g200);margin-bottom:20px;position:relative;height:300px}
.chart-canvas{position:relative;height:100%}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;right:20px;background:#fff;padding:16px 20px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,.2);font-size:13px;font-weight:600;z-index:2000;max-width:300px;animation:slideIn .3s ease}
.toast.ok{border-left:4px solid var(--green)}
.toast.err{border-left:4px solid var(--red)}
.toast.warn{border-left:4px solid #ff9500}
@keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== RESPONSIVO ===== */
@media(max-width:768px){
  :root{--sw:0;--th:50px}
  .sidebar{position:absolute;width:200px;height:100vh;z-index:100;left:-200px;transition:left .3s}
  .sidebar.open{left:0}
  .sidebar-toggle{display:block;width:40px;height:40px;background:none;border:none;cursor:pointer;font-size:20px;color:var(--blue)}
  .main{padding:15px}
  .form-grid{grid-template-columns:1fr}
  .header-left{font-size:16px}
  .chart-container{height:250px}
}


/* =====================
   🌙 MODO ESCURO
   ===================== */
body.dark-mode {
  background: #1a1d24 !important;
  color: #e4e6eb !important;
}
body.dark-mode .sidebar { background: linear-gradient(180deg, #15171c 0%, #1a1d24 100%) !important; }
body.dark-mode .topbar { background: #232730 !important; border-bottom-color: #2d323d !important; color: #e4e6eb !important; }
body.dark-mode .card,
body.dark-mode .modal-body,
body.dark-mode .modal-header,
body.dark-mode .table,
body.dark-mode .table th,
body.dark-mode .table td { background: #232730 !important; color: #e4e6eb !important; border-color: #2d323d !important; }
body.dark-mode .modal { background: rgba(0,0,0,0.7) !important; }
body.dark-mode input,
body.dark-mode textarea,
body.dark-mode select { background: #1a1d24 !important; color: #e4e6eb !important; border-color: #2d323d !important; }
body.dark-mode .nav-item { color: #d4d7dd !important; }
body.dark-mode .nav-item:hover { background: rgba(255,215,0,0.1) !important; }
body.dark-mode .stat-card,
body.dark-mode .stat-num { color: #e4e6eb !important; }
body.dark-mode label { color: #c9ccd1 !important; }
body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4 { color: #f0f2f5 !important; }
body.dark-mode .progress-container,
body.dark-mode [style*="background:#fff"] { background: #232730 !important; color: #e4e6eb !important; }
body.dark-mode [style*="background:var(--blue-l)"] { background: rgba(0,87,183,0.2) !important; }
body.dark-mode [style*="background:#fffbe6"] { background: #2a2818 !important; }

/* =====================
   🔎 BARRA DE BUSCA
   ===================== */
.search-bar {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--g200);
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
  transition: border-color .2s;
}
.search-bar:focus { border-color: var(--blue); }
body.dark-mode .search-bar { background: #1a1d24; color: #e4e6eb; border-color: #2d323d; }

/* =====================
   🔘 BOTÃO MODO ESCURO
   ===================== */
.dark-toggle {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
}
.dark-toggle:hover { background: rgba(255,255,255,0.1); }
body.dark-mode .dark-toggle { border-color: #4a4f5b; }

/* Pulse animation pro marcador ao vivo */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.2); }
}

</style>
</head>

<!-- MODAL: CÂMERA PARA FOTO -->
<div id="m-camera" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span><i class="fas fa-camera"></i> Tirar Foto</span>
      <button type="button" class="modal-close" onclick="fecharCamera()"><i class="fas fa-times"></i></button>
    </div>
    <div style="text-align:center">
      <video id="video-stream" style="width:100%;max-width:400px;border-radius:8px;margin:15px 0"></video>
      <canvas id="canvas-foto" style="display:none"></canvas>
      <img id="preview-foto" style="width:100%;max-width:400px;border-radius:8px;margin:15px 0;display:none">
      <div style="display:flex;gap:10px;justify-content:center;margin:20px 0">
        <button type="button" class="btn btn-blue" id="btn-iniciar-camera" onclick="iniciarCamera()" style="flex:1">
          <i class="fas fa-video"></i> Iniciar Câmera
        </button>
        <button type="button" class="btn btn-green" id="btn-tirar-foto" onclick="tirarFoto()" style="flex:1;display:none">
          <i class="fas fa-camera"></i> Tirar Foto
        </button>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button type="button" class="btn btn-green" id="btn-confirmar-foto" onclick="confirmarFoto()" style="flex:1;display:none">
          <i class="fas fa-check"></i> Confirmar
        </button>
        <button type="button" class="btn btn-orange" id="btn-nova-foto" onclick="novaFoto()" style="flex:1;display:none">
          <i class="fas fa-redo"></i> Nova Foto
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: CADASTRAR LÍDER -->
<div id="m-lider" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span><i class="fas fa-user-tie"></i> Cadastrar Líder</span>
      <button type="button" class="modal-close" onclick="closeModal('m-lider')"><i class="fas fa-times"></i></button>
    </div>
    <form id="m-lider-form" onsubmit="saveLider(event)">
      <input type="hidden" id="lider-id-edit">
      <div class="form-grid">
        <div class="form-group">
          <label>Nome Completo *</label>
          <input type="text" id="lider-nome" required>
        </div>
        <div class="form-group">
          <label>CPF *</label>
          <input type="text" id="lider-cpf" required>
        </div>
        <div class="form-group">
          <label>Telefone *</label>
          <input type="tel" id="lider-tel" required>
        </div>
        <div class="form-group">
          <label>Bairro *</label>
          <input type="text" id="lider-bairro" required>
        </div>
        <div class="form-group">
          <label>Profissão *</label>
          <input type="text" id="lider-profissao" required>
        </div>
        <div class="form-group">
          <label>Título Eleitoral (opcional)</label>
          <input type="text" id="lider-titulo" placeholder="Número do título" inputmode="numeric">
          <button type="button" class="btn btn-blue" onclick="window.open('https://www.tse.jus.br/servicos-eleitorais/autoatendimento-eleitoral#/atendimento-eleitor/consultar-situacao-titulo-eleitor','_blank')" style="margin-top:6px;padding:8px 12px;font-size:12px">
            <i class="fas fa-external-link-alt"></i> Verificar no TSE
          </button>
        </div>
        <div class="form-group">
          <label>Latitude (GPS)</label>
          <input type="number" id="lider-lat" step="0.00001" placeholder="Ex: 2.8235">
        </div>
        <div class="form-group">
          <label>Longitude (GPS)</label>
          <input type="number" id="lider-lng" step="0.00001" placeholder="Ex: -60.6758">
        </div>
        <div class="form-group">
          <label>Meta de apoiadores (opcional)</label>
          <input type="number" id="lider-meta" placeholder="Ex: 50" min="0">
        </div>
        <div class="form-group">
          <label id="lider-senha-label">Senha *</label>
          <input type="password" id="lider-senha" minlength="6">
        </div>
      </div>

      <button type="button" class="btn btn-blue" onclick="obterGPSLider()" style="margin:15px 0">
        <i class="fas fa-map-marker-alt"></i> Obter Localização Atual
      </button>

      <button type="button" class="btn btn-orange" onclick="abrirCamera('lider')" style="margin:15px 0">
        <i class="fas fa-camera"></i> Tirar Foto
      </button>

      <div id="lider-foto-preview" style="text-align:center;margin:15px 0">
        <img id="lider-foto-img" style="max-width:200px;border-radius:8px;display:none">
        <p id="lider-foto-status" style="color:var(--g600);font-size:12px"></p>
      </div>

      <button type="submit" class="btn btn-green" style="margin-top:20px" id="btn-salvar-lider">
        <i class="fas fa-save"></i> CADASTRAR LÍDER
      </button>
    </form>
  </div>
</div>

<!-- MODAL: CADASTRAR APOIADOR -->
<div id="m-apoiador" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span><i class="fas fa-users"></i> Cadastrar Apoiador</span>
      <button type="button" class="modal-close" onclick="closeModal('m-apoiador')"><i class="fas fa-times"></i></button>
    </div>
    <form id="m-apoiador-form" onsubmit="saveApoiador(event)">
      <input type="hidden" id="ap-id-edit">

      <!-- ===== PERGUNTAS PRIMEIRO ===== -->
      <div class="card" style="margin-bottom:20px">
        <h3><i class="fas fa-vote-yea"></i> Intenção de Voto</h3>

        <div class="form-group" style="margin-bottom:20px">
          <label style="display:block;margin-bottom:12px">Vc apoiaria Magda Paixão como Deputada Estadual?</label>
          <div style="display:flex;flex-direction:column;gap:10px">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:0">
              <input type="radio" name="ap-voto-estadual" value="sim" onchange="atualizarVoto()">
              <span style="font-weight:600">✓ Sim</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:0">
              <input type="radio" name="ap-voto-estadual" value="nao" onchange="atualizarVoto()">
              <span style="font-weight:600">✗ Não</span>
            </label>
          </div>
        </div>
        <div class="form-group" id="wrap-deputado-estadual" style="display:none">
          <label>Qual Deputado Estadual?</label>
          <input type="text" id="ap-deputado-estadual" placeholder="Nome do candidato">
        </div>

        <div class="form-group" style="margin-bottom:20px">
          <label style="display:block;margin-bottom:12px">Vc apoiaria Orcini para Deputado Federal?</label>
          <div style="display:flex;flex-direction:column;gap:10px">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:0">
              <input type="radio" name="ap-voto-federal" value="sim" onchange="atualizarVoto()">
              <span style="font-weight:600">✓ Sim</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin:0">
              <input type="radio" name="ap-voto-federal" value="nao" onchange="atualizarVoto()">
              <span style="font-weight:600">✗ Não</span>
            </label>
          </div>
        </div>
        <div class="form-group" id="wrap-deputado-federal" style="display:none">
          <label>Qual Deputado Federal?</label>
          <input type="text" id="ap-deputado-federal" placeholder="Nome do candidato">
        </div>

        <div class="form-group">
          <label>Quantas pessoas moram na sua casa maiores de 16 anos?</label>
          <input type="number" id="ap-moradores" min="1" max="30" placeholder="Ex: 3" inputmode="numeric">
        </div>

        <div class="form-group">
          <label>O que mais incomoda hoje aqui no bairro?</label>
          <textarea id="ap-incomoda" placeholder="Ex: Buraco na rua, falta de segurança..." style="min-height:80px"></textarea>
        </div>

        <div class="form-group">
          <label>E na política, você acha que os atuais deputados estão ajudando?</label>
          <textarea id="ap-deputados-opiniao" placeholder="Resposta do apoiador..." style="min-height:80px"></textarea>
        </div>

        <div class="form-group">
          <label>Você sente que os políticos lembram da população depois da eleição?</label>
          <textarea id="ap-politicos-lembram" placeholder="Resposta do apoiador..." style="min-height:80px"></textarea>
        </div>

        <div class="form-group">
          <label>Hoje você se sente representado por algum deputado?</label>
          <textarea id="ap-representado" placeholder="Resposta do apoiador..." style="min-height:80px"></textarea>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <h3><i class="fas fa-chess"></i> Perguntas Estratégicas</h3>

// Hash SHA-256 (usa Web Crypto API nativa do navegador)
async function hashSenha(senha) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(senha));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Aplica máscara 000.000.000-00 enquanto digita
function aplicarMascaraCPF(input) {
  if (!input || input.dataset.maskApplied) return;
  input.dataset.maskApplied = '1';
  input.addEventListener('input', () => {
    let v = input.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    input.value = v;
  });
}

// Aplica máscara de telefone (99) 99999-9999
function aplicarMascaraTel(input) {
  if (!input || input.dataset.maskApplied) return;
  input.dataset.maskApplied = '1';
  input.addEventListener('input', () => {
    let v = input.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
    else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
    else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, '($1) $2');
    input.value = v.trim();
  });
}

function limparCPF(cpf) { return (cpf || '').replace(/\D/g, ''); }

function validarCPF(cpf) {
  cpf = limparCPF(cpf);
  if (cpf.length !== 11) return false;
  if (/^(\d)\1{10}$/.test(cpf)) return false;
  let s = 0, r;
  for (let i = 1; i <= 9; i++) s += parseInt(cpf.charAt(i-1)) * (11-i);
  r = (s * 10) % 11; if (r === 10 || r === 11) r = 0;
  if (r !== parseInt(cpf.charAt(9))) return false;
  s = 0;
  for (let i = 1; i <= 10; i++) s += parseInt(cpf.charAt(i-1)) * (12-i);
  r = (s * 10) % 11; if (r === 10 || r === 11) r = 0;
  return r === parseInt(cpf.charAt(10));
}

// Comprime base64 em JPEG (canvas) — reduz drasticamente o peso da foto
async function comprimirFoto(dataUrl, maxLargura = 800, qualidade = 0.6) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxLargura) {
        height = Math.round(height * maxLargura / width);
        width = maxLargura;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      try { resolve(canvas.toDataURL('image/jpeg', qualidade)); }
      catch (e) { reject(e); }
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// Buscar bairro por GPS (Nominatim — gratuito)
async function buscarBairroPorGPS(lat, lng) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&accept-language=pt-BR`;
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!resp.ok) return null;
    const j = await resp.json();
    return j.address?.suburb || j.address?.neighbourhood || j.address?.city_district || null;
  } catch { return null; }
}

// Filtra coleção (objeto ou array) por termo de busca em campos especificados
function filtrarPorBusca(itens, termo, campos) {
  if (!termo) return itens;
  const t = termo.toLowerCase().trim();
  if (Array.isArray(itens)) {
    return itens.filter(it => campos.some(c => String(it[c] || '').toLowerCase().includes(t)));
  }
  const out = {};
  for (const k in itens) {
    if (campos.some(c => String(itens[k][c] || '').toLowerCase().includes(t))) out[k] = itens[k];
  }
  return out;
}

// 🔐 AUTENTICAÇÃO
// =====================
async function fazerLogin() {
  const cpfRaw = document.getElementById('login-cpf').value.trim();
  const senha  = document.getElementById('login-senha').value.trim();
  const cpf    = limparCPF(cpfRaw);

  if (!cpf || !senha) {
    mostrarToast('Por favor, preencha CPF e senha', 'err');
    return;
  }

  // Admin (hardcoded)
  if (cpf === '43659829234' && senha === 'P@ixao10') {
    usuarioLogado = { cpf, nome: 'Admin', role: 'admin' };
  } else {
    // Líderes — comparar via hash. Migração automática de senhas em texto puro.
    const lideres = DB.getLiders();
    const senhaHash = await hashSenha(senha);
    let liderEncontrado = null, liderId = null;

    for (const id in lideres) {
      const l = lideres[id];
      if (limparCPF(l.cpf) !== cpf) continue;
      if (l.senhaHash && l.senhaHash === senhaHash) {
        liderEncontrado = l; liderId = id; break;
      }
      // Migração: senha em texto puro → vira hash
      if (!l.senhaHash && l.senha && l.senha === senha) {
        l.senhaHash = senhaHash;
        delete l.senha;
        DB.saveLiders(lideres);
        liderEncontrado = l; liderId = id;
        break;
      }
    }

    if (!liderEncontrado) {
      mostrarToast('CPF ou senha incorretos', 'err');
      return;
    }
    usuarioLogado = { cpf, nome: liderEncontrado.nome, role: 'lider', id: liderId };
  }

  localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado));
  document.getElementById('auth').classList.remove('on');
  document.getElementById('app').classList.add('on');
  renderMenuByRole();
  refreshHome();
  addTracking('LOGIN', `${usuarioLogado.nome} entrou no sistema`);
  mostrarToast(`Bem-vindo, ${usuarioLogado.nome}!`, 'ok');
}
// (logout)
function fazerLogout() {
  if (!confirm('Tem certeza que deseja sair?')) return;

  // Para rastreamento se estiver ativo
  if (rastreamentoAtivo) pararRastreamento();

  localStorage.removeItem('usuarioLogado');
  usuarioLogado = null;
  
  document.getElementById('auth').classList.add('on');
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-cpf').value = '';
  document.getElementById('login-senha').value = '';
  
  mostrarToast('Desconectado', 'ok');
}

function renderMenuByRole() {
  const nav = document.getElementById('sidebarNav');
  const userCard = document.getElementById('userCard');
  
  userCard.innerHTML = `
    <div class="user-role">${usuarioLogado.role === 'admin' ? '👨‍💼 Admin' : '👥 Líder'}</div>
    <div class="user-name">${usuarioLogado.nome}</div>
    <div class="user-status">Online</div>
  `;

  nav.innerHTML = '';

  if (usuarioLogado.role === 'admin') {
    nav.innerHTML = `
      <div class="nav-item active" onclick="showHome()"><i class="fas fa-home"></i> Início</div>
      <div class="nav-item" onclick="showLideres()"><i class="fas fa-user-tie"></i> Líderes</div>

    `;
  } else {
    nav.innerHTML = `

function showHome() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');

  document.getElementById('pageTitle').textContent = 'Início';
  const lideres = DB.getLiders();
  const apoiadores = DB.getApoiadores();
  const totalLideres = Object.keys(lideres).length;
  const totalAp = Object.keys(apoiadores).length;
  const apList = Object.values(apoiadores);
  const magda = apList.filter(a => a.voto === 'sim').length;
  const orcini = apList.filter(a => a.voto_federal === 'sim').length;
  const taxa = totalAp > 0 ? Math.round((magda / totalAp) * 100) : 0;

  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:var(--blue-l);color:var(--blue)"><i class="fas fa-user-tie"></i></div><div><div class="stat-num">${totalLideres}</div><div class="stat-label">Líderes</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:#d97706"><i class="fas fa-users"></i></div><div><div class="stat-num">${totalAp}</div><div class="stat-label">Apoiadores</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#dcfce7;color:var(--green)"><i class="fas fa-vote-yea"></i></div><div><div class="stat-num">${magda}</div><div class="stat-label">✓ Magda</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#dcfce7;color:var(--green)"><i class="fas fa-star"></i></div><div><div class="stat-num">${orcini}</div><div class="stat-label">✓ Orcini</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#fee2e2;color:var(--red)"><i class="fas fa-percentage"></i></div><div><div class="stat-num">${taxa}%</div><div class="stat-label">Conversão</div></div></div>
    </div>
  `;

  if (usuarioLogado.role === 'admin') {
    // Painel "Quem está em pausa agora"
    const pausas = DB.getPausas();
    const pausasAtivas = pausas.filter(p => !p.retomadaEm);
    const lideresAtivos = Object.values(lideres).filter(l => !pausasAtivas.some(p => p.lider === l.nome));

    html += `

          <div style="padding:14px;background:#dcfce7;border-radius:10px;border-left:4px solid var(--green)">

            <div style="font-size:24px;font-weight:800;color:var(--green);margin-top:4px">${lideresAtivos.length}</div>

          <div style="padding:14px;background:#fef3c7;border-radius:10px;border-left:4px solid var(--orange)">
            <div style="font-size:11px;color:#d97706;font-weight:700;text-transform:uppercase">Em Pausa</div>
            <div style="font-size:24px;font-weight:800;color:#d97706;margin-top:4px">${pausasAtivas.length}</div>

function renderTabelaLideres() {
  const termo = document.getElementById('busca-lideres')?.value || '';
  const lideres = filtrarPorBusca(DB.getLiders(), termo, ['nome', 'cpf', 'bairro', 'profissao']);
  const apoiadores = Object.values(DB.getApoiadores());

  let html = `<div style="overflow-x:auto"><table class="table">
    <thead><tr><th>Foto</th><th>Nome</th><th>CPF</th><th>Telefone</th><th>Bairro</th><th>Apoiad.</th><th>Meta</th><th>Ações</th></tr></thead><tbody>`;

  const ids = Object.keys(lideres);
  if (ids.length === 0) {
    html += `<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--g600)">Nenhum líder ${termo ? 'encontrado' : 'cadastrado'}.</td></tr>`;
  }
  for (const id of ids) {
    const l = lideres[id];
    const fotoHtml = l.foto
      ? `<img src="${l.foto}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`
      : `<i class="fas fa-user-tie" style="color:var(--blue);font-size:20px"></i>`;
    const totalAp = apoiadores.filter(a => a.cadastradoPor === l.nome).length;
    const meta = l.meta || 0;
    const pctMeta = meta > 0 ? Math.min(Math.round((totalAp / meta) * 100), 100) : 0;
    const metaHtml = meta > 0
      ? `<div style="font-size:11px;color:var(--g600)">${pctMeta}% de ${meta}</div>`
      : `<span style="color:var(--g500);font-size:11px">—</span>`;

    html += `<tr>
      <td>${fotoHtml}</td>
      <td><strong>${l.nome}</strong></td>
      <td>${l.cpf}</td>
      <td>${l.tel || '-'}</td>
      <td>${l.bairro || '-'}</td>
      <td><span style="background:var(--blue-l);color:var(--blue);padding:3px 8px;border-radius:10px;font-weight:700;font-size:12px">${totalAp}</span></td>
      <td>${metaHtml}</td>
      <td>
        <button class="btn-sm" style="background:var(--blue);color:#fff" onclick="editarLider('${id}')"><i class="fas fa-edit"></i></button>
        <button class="btn-sm btn-sm-danger" onclick="deleteLider('${id}')"><i class="fas fa-trash"></i></button>
      </td>
    </tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById('tabela-lideres-wrap').innerHTML = html;
}

function showRendimento() {
  if (usuarioLogado.role !== 'admin') {
    mostrarToast('Acesso apenas Admin', 'err');
    return;
  }
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');

  const lideres = DB.getLiders();
  const apoiadores = Object.values(DB.getApoiadores());
  document.getElementById('pageTitle').textContent = 'Rendimento';

  const contagem = {};
  apoiadores.forEach(a => {
    const nome = a.cadastradoPor || 'Desconhecido';
    contagem[nome] = (contagem[nome] || 0) + 1;
  });

  const lista = Object.entries(lideres).map(([id, l]) => ({
    id, nome: l.nome, foto: l.foto, bairro: l.bairro, meta: l.meta || 0,
    total: contagem[l.nome] || 0
  })).sort((a, b) => b.total - a.total);

  let html = `
    <div class="card">
      <h3><i class="fas fa-trophy"></i> Rendimento dos Líderes</h3>
      <p style="color:var(--g600);font-size:13px;margin-bottom:14px">Toque em um líder para ver os apoiadores que ele cadastrou.</p>
      <input type="text" class="search-bar" id="busca-rend" placeholder="🔎 Buscar líder..." oninput="document.querySelectorAll('.rend-card').forEach(c => c.style.display = c.dataset.nome.toLowerCase().includes(this.value.toLowerCase()) ? '' : 'none')">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
  `;

  if (lista.length === 0) html += `<p style="grid-column:1/-1;text-align:center;color:var(--g600);padding:30px">Nenhum líder cadastrado.</p>`;

  lista.forEach((l, idx) => {
    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
    const fotoHtml = l.foto
      ? `<img src="${l.foto}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid var(--blue)">`
      : `<div style="width:60px;height:60px;border-radius:50%;background:var(--blue-l);display:flex;align-items:center;justify-content:center;border:3px solid var(--blue)"><i class="fas fa-user-tie" style="color:var(--blue);font-size:24px"></i></div>`;

    const pctMeta = l.meta > 0 ? Math.min(Math.round((l.total / l.meta) * 100), 100) : 0;
    const corBarra = pctMeta >= 100 ? 'var(--green)' : pctMeta >= 50 ? 'var(--blue)' : 'var(--orange)';
    const barraMeta = l.meta > 0
      ? `<div style="width:100%;height:6px;background:var(--g200);border-radius:3px;overflow:hidden;margin-top:8px"><div style="height:100%;background:${corBarra};width:${pctMeta}%"></div></div><div style="font-size:11px;color:var(--g600);margin-top:4px;text-align:right">${pctMeta}% de ${l.meta}</div>`
      : '';

    html += `
      <div class="rend-card" data-nome="${l.nome}" onclick="showRendimentoLider('${l.id}')" style="background:#fff;border:1px solid var(--g200);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--blue)';this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 18px rgba(0,87,183,.15)'" onmouseout="this.style.borderColor='var(--g200)';this.style.transform='';this.style.boxShadow=''">
        <div style="display:flex;align-items:center;gap:14px">
          ${fotoHtml}
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;color:var(--g800);font-size:14px">${medal} ${l.nome}</div>
            <div style="font-size:11px;color:var(--g600);margin-top:2px">${l.bairro || '-'}</div>
          </div>
          <div style="text-align:center;background:var(--blue-l);padding:8px 12px;border-radius:10px;min-width:60px">
            <div style="font-size:22px;font-weight:800;color:var(--blue);line-height:1">${l.total}</div>
            <div style="font-size:9px;color:var(--blue);text-transform:uppercase;font-weight:700;margin-top:2px">apoiad.</div>
          </div>
        </div>
        ${barraMeta}
      </div>
    `;
  });

  html += `</div></div>`;
  document.getElementById('mainContent').innerHTML = html;
}

function renderTabelaApoiadores() {
  const termo = document.getElementById('busca-apoiadores')?.value || '';
  const filtroVoto = document.getElementById('filtro-voto')?.value || '';
  let apoiadores = filtrarPorBusca(DB.getApoiadores(), termo, ['nome', 'cpf', 'bairro', 'cadastradoPor']);
  if (filtroVoto) {
    const filtrados = {};
    for (const k in apoiadores) if (apoiadores[k].voto === filtroVoto) filtrados[k] = apoiadores[k];
    apoiadores = filtrados;
  }

  let html = `<div style="overflow-x:auto"><table class="table">
    <thead><tr><th>Foto</th><th>Nome</th><th>CPF</th><th>Voto</th><th>Bairro</th><th>Líder</th><th>Data</th><th>Ações</th></tr></thead><tbody>`;

  const ids = Object.keys(apoiadores).sort((a,b) => new Date(apoiadores[b].timestamp) - new Date(apoiadores[a].timestamp));
  if (ids.length === 0) {
    html += `<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--g600)">Nenhum apoiador ${termo || filtroVoto ? 'encontrado com esses filtros' : 'cadastrado'}.</td></tr>`;
  }
  for (const id of ids) {
    const a = apoiadores[id];
    const fotoHtml = a.foto
      ? `<img src="${a.foto}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`
      : `<i class="fas fa-user" style="color:var(--g600);font-size:20px"></i>`;
    const voto = a.voto === 'sim' ? '<span style="color:var(--green);font-weight:700">✓ Magda</span>' : '<span style="color:var(--red);font-weight:700">✗ Outro</span>';
    const data = new Date(a.timestamp).toLocaleDateString('pt-BR');

    html += `<tr>
      <td>${fotoHtml}</td>
      <td><strong>${a.nome}</strong></td>
      <td>${a.cpf}</td>
      <td>${voto}</td>
      <td>${a.bairro || '-'}</td>
      <td>${a.cadastradoPor || '-'}</td>
      <td>${data}</td>
      <td>
        <button class="btn-sm" style="background:var(--blue);color:#fff" onclick="editarApoiador('${id}')"><i class="fas fa-edit"></i></button>
        ${a.tel ? `<button class="btn-sm" style="background:#25d366;color:#fff" onclick="abrirWhatsApp('${a.tel}','${a.nome.replace(/'/g,"\\'")}')"><i class="fab fa-whatsapp"></i></button>` : ''}

      </td>
    </tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById('tabela-apoiadores-wrap').innerHTML = html;

function abrirWhatsApp(tel, nome) {
  const num = (tel || '').replace(/\D/g, '');
  if (!num) { mostrarToast('Telefone inválido', 'err'); return; }
  const numComDDI = num.length === 11 ? '55' + num : num.length === 10 ? '55' + num : num;
  const msg = encodeURIComponent(`Olá ${nome}! Aqui é da campanha da Magda Paixão.`);
  window.open(`https://wa.me/${numComDDI}?text=${msg}`, '_blank');
}

  apoiadores.forEach(a => { if (a.rua) porRua[a.rua] = (porRua[a.rua] || 0) + 1; });

          <div style="font-size:34px;font-weight:800;color:var(--green)">${pctMagda}%</div>
          <div style="font-size:12px;color:var(--g700);margin-top:4px;text-transform:uppercase;font-weight:700">Magda (${magda})</div>
        </div>
        <div style="flex:1;min-width:120px;text-align:center;padding:18px;background:#fee2e2;border-radius:12px">
          <div style="font-size:34px;font-weight:800;color:var(--red)">${pctOutros}%</div>
          <div style="font-size:12px;color:var(--g700);margin-top:4px;text-transform:uppercase;font-weight:700">Outros (${outros})</div>
        </div>
      </div>
    </div>

        const pct = Math.round((n / topBairros[0][1]) * 100);

          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><strong>${b}</strong><span>${n}</span></div>

        </div>`;
      }).join('')}

    <div class="card">
      <h3><i class="fas fa-road"></i> Top 10 Ruas (para carreata)</h3>
      ${topRuas.length === 0 ? '<p style="color:var(--g600);text-align:center;padding:20px">Cadastre apoiadores com rua para ver o ranking.</p>' : ''}
      ${topRuas.map(([r, n], i) => {
        const pct = Math.round((n / topRuas[0][1]) * 100);

          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><strong>${i+1}. ${r}</strong><span>${n}</span></div>

  `;

}

function showMapa() {
  if (usuarioLogado.role !== 'admin') {
    mostrarToast('Apenas Admin', 'err');
    return;
  }

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.nav-item')?.classList.add('active');

  document.getElementById('pageTitle').textContent = 'Mapa GPS — Líderes';
  document.getElementById('mainContent').innerHTML = `
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px">
        <span><span style="display:inline-block;width:14px;height:14px;background:#0057B7;border-radius:50%;vertical-align:middle"></span> Líder cadastrado</span>
        <span><span style="display:inline-block;width:14px;height:14px;background:#22c55e;border-radius:50%;vertical-align:middle"></span> Líder rastreado ao vivo</span>
        <span style="color:var(--g600);font-size:11px">Clique em um líder para ver os detalhes</span>
      </div>
    </div>
    <div id="map" style="width:100%;height:500px;border-radius:12px"></div>
  `;

  setTimeout(() => {
    const map = new google.maps.Map(document.getElementById('map'), {
      zoom: 13,
      center: { lat: 2.8235, lng: -60.6758 } // Boa Vista — RR
    });

    // InfoWindow único e reaproveitado (uma janela por vez)
    const infoWindow = new google.maps.InfoWindow();

    const apoiadoresAll = Object.values(DB.getApoiadores());

    // Helper: monta o HTML do balão com dados do líder
    function montarInfoLider(l, opcoesExtras) {
      const fotoHtml = l.foto
        ? `<img src="${l.foto}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #0057B7">`
        : `<div style="width:60px;height:60px;border-radius:50%;background:#e8f0fb;display:flex;align-items:center;justify-content:center;border:3px solid #0057B7"><i class="fas fa-user-tie" style="color:#0057B7;font-size:24px"></i></div>`;
      const cpfFmt = (l.cpf || '').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      const totalAp = apoiadoresAll.filter(a => a.cadastradoPor === l.nome).length;
      const ext = opcoesExtras || '';

      return `
        <div style="font-family:Segoe UI,sans-serif;min-width:250px;max-width:300px">
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px">
            ${fotoHtml}
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:700;color:#003d82">${l.nome}</div>
              <div style="font-size:11px;color:#666">${l.profissao || '—'}</div>
            </div>
          </div>
          <div style="font-size:12px;line-height:1.7;color:#333">
            <div><i class="fas fa-id-card" style="color:#0057B7;width:14px"></i> <strong>CPF:</strong> ${cpfFmt || '—'}</div>
            <div><i class="fas fa-phone" style="color:#0057B7;width:14px"></i> <strong>Tel:</strong> ${l.tel || '—'}</div>
            <div><i class="fas fa-map-marker-alt" style="color:#0057B7;width:14px"></i> <strong>Bairro:</strong> ${l.bairro || '—'}</div>
            ${l.titulo_eleitoral ? `<div><i class="fas fa-vote-yea" style="color:#0057B7;width:14px"></i> <strong>Título:</strong> ${l.titulo_eleitoral}</div>` : ''}
            <div style="margin-top:6px;padding:6px 10px;background:#e8f0fb;border-radius:6px;color:#0057B7;font-weight:700">
              <i class="fas fa-users"></i> ${totalAp} apoiador(es) cadastrado(s)
            </div>
            ${ext}
          </div>
          ${l.tel ? `<button onclick="abrirWhatsApp('${l.tel}','${(l.nome || '').replace(/'/g,"\\'")}')" style="margin-top:10px;padding:6px 12px;background:#25d366;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;width:100%"><i class="fab fa-whatsapp"></i> WhatsApp</button>` : ''}
        </div>
      `;
    }

    // Marcadores fixos (cadastro do líder)
    const lideres = DB.getLiders();
    for (const id in lideres) {
      const l = lideres[id];
      if (!l.lat || !l.lng) continue;

      const marker = new google.maps.Marker({
        position: { lat: parseFloat(l.lat), lng: parseFloat(l.lng) },
        map: map,
        title: l.nome,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#0057B7',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2
        }
      });

      marker.addListener('click', () => {
        infoWindow.setContent(montarInfoLider(l));
        infoWindow.open(map, marker);
      });
    }

    // 🟢 Rastreamento ao vivo: ouvir Firebase /rastreamento
    const marcadoresLive = {};
    if (firebaseInitialized && firebaseDb) {
      firebaseDb.ref('rastreamento').on('value', (snap) => {
        const dados = snap.val() || {};
        // Limpa antigos
        for (const k in marcadoresLive) {
          marcadoresLive[k].setMap(null);
          delete marcadoresLive[k];
        }

        for (const liderId in dados) {
          const r = dados[liderId];
          if (!r.lat || !r.lng || r.ativo === false) continue;

          // Buscar dados completos do líder
          const liderCompleto = lideres[liderId] || { nome: r.nome, cpf: r.cpf };

          const marker = new google.maps.Marker({
            position: { lat: r.lat, lng: r.lng },
            map: map,
            title: r.nome + ' (ao vivo)',
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 12,
              fillColor: '#22c55e',
              fillOpacity: 1,
              strokeColor: '#fff',
              strokeWeight: 3
            },
            zIndex: 999
          });

          const extra = `
            <div style="margin-top:6px;padding:6px 10px;background:#dcfce7;border-radius:6px;color:#15803d;font-weight:700">
              🟢 Ao vivo • ${new Date(r.atualizadoEm).toLocaleTimeString('pt-BR')}
              <div style="font-size:10px;font-weight:400;color:#444;margin-top:2px">precisão ${Math.round(r.precisao || 0)}m</div>
            </div>
          `;

          marker.addListener('click', () => {
            infoWindow.setContent(montarInfoLider(liderCompleto, extra));
            infoWindow.open(map, marker);
          });

          marcadoresLive[liderId] = marker;
        }
      });
    }
  }, 100);
}

// ===== CÂMERA =====
function abrirCamera(tipo) {
  tipoFotoAtual = tipo;
  openModal('m-camera');
  iniciarCamera();
}

function iniciarCamera() {
  const video = document.getElementById('video-stream');
  const btn = document.getElementById('btn-iniciar-camera');
  const btnTirar = document.getElementById('btn-tirar-foto');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
    .then(stream => {
      streamAtual = stream;
      video.srcObject = stream;
      video.play();
      btn.style.display = 'none';
      btnTirar.style.display = 'block';
      mostrarToast('Câmera iniciada', 'ok');
    })
    .catch(err => {
      mostrarToast('Erro ao acessar câmera: ' + err.message, 'err');
      console.error(err);
    });
}

function tirarFoto() {
  const video = document.getElementById('video-stream');
  const canvas = document.getElementById('canvas-foto');
  const preview = document.getElementById('preview-foto');
  const btnTirar = document.getElementById('btn-tirar-foto');
  const btnConfirmar = document.getElementById('btn-confirmar-foto');
  const btnNova = document.getElementById('btn-nova-foto');

  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  fotoAtual = canvas.toDataURL('image/jpeg', 0.9);
  
  preview.src = fotoAtual;
  preview.style.display = 'block';
  video.style.display = 'none';

  btnTirar.style.display = 'none';
  btnConfirmar.style.display = 'block';
  btnNova.style.display = 'block';

  mostrarToast('Foto capturada', 'ok');
}

function novaFoto() {
  document.getElementById('btn-tirar-foto').style.display = 'block';
  document.getElementById('btn-confirmar-foto').style.display = 'none';
  document.getElementById('btn-nova-foto').style.display = 'none';
  document.getElementById('video-stream').style.display = 'block';
  document.getElementById('preview-foto').style.display = 'none';
}

function confirmarFoto() {
  if (tipoFotoAtual === 'lider') {
    document.getElementById('lider-foto-img').src = fotoAtual;
    document.getElementById('lider-foto-img').style.display = 'block';
    document.getElementById('lider-foto-status').textContent = '✓ Foto capturada com sucesso';
  } else {
    document.getElementById('ap-foto-img').src = fotoAtual;
    document.getElementById('ap-foto-img').style.display = 'block';
    document.getElementById('ap-foto-status').textContent = '✓ Foto capturada com sucesso';
  }

  fecharCamera();
}

function fecharCamera() {
  if (streamAtual) {
    streamAtual.getTracks().forEach(track => track.stop());
  }
  closeModal('m-camera');
  document.getElementById('video-stream').style.display = 'block';
  document.getElementById('preview-foto').style.display = 'none';
  document.getElementById('btn-iniciar-camera').style.display = 'block';
  document.getElementById('btn-tirar-foto').style.display = 'none';
  document.getElementById('btn-confirmar-foto').style.display = 'none';
  document.getElementById('btn-nova-foto').style.display = 'none';
}

// =====================
// 📍 RASTREAMENTO AO VIVO (líder)
// =====================
function iniciarRastreamento() {
  if (!navigator.geolocation) {
    mostrarToast('GPS não suportado neste dispositivo', 'err');
    return;
  }
  if (usuarioLogado?.role !== 'lider') {
    mostrarToast('Apenas líderes podem ativar o rastreamento', 'err');
    return;
  }
  if (rastreamentoAtivo) return;

  // Pede permissão e começa a observar a posição
  watchIdRastreamento = navigator.geolocation.watchPosition(
    (pos) => {
      const dados = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        precisao: pos.coords.accuracy,
        atualizadoEm: new Date().toISOString(),
        nome: usuarioLogado.nome,
        cpf: usuarioLogado.cpf
      };
      // Atualiza Firebase em /rastreamento/{liderId}
      if (firebaseInitialized && firebaseDb && usuarioLogado.id) {
        firebaseDb.ref('rastreamento/' + usuarioLogado.id).set(dados)
          .catch(err => console.warn('Falha ao gravar rastreio:', err.message));
      }
      // Atualiza tela do líder
      const elInfo = document.getElementById('rastreio-info');
      if (elInfo) {
        elInfo.innerHTML = `
          <div style="font-size:11px;color:var(--g600);margin-top:6px">
            <i class="fas fa-map-marker-alt"></i> ${dados.lat.toFixed(5)}, ${dados.lng.toFixed(5)}
            <br><i class="fas fa-clock"></i> ${new Date().toLocaleTimeString('pt-BR')}
            <br><i class="fas fa-bullseye"></i> precisão ${Math.round(dados.precisao)}m
          </div>
        `;
      }
    },
    (err) => {
      console.error('Erro rastreio:', err);
      mostrarToast('Erro no GPS: ' + err.message, 'err');
      pararRastreamento();
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 30000 }
  );

  rastreamentoAtivo = true;
  localStorage.setItem('rastreamentoAtivo', '1');
  addTracking('RASTREIO_ON', `${usuarioLogado.nome} ativou localização`);
  mostrarToast('Localização ativada! Você está sendo rastreado.', 'ok');
  refreshHome();
}

function pararRastreamento() {
  if (watchIdRastreamento !== null) {
    navigator.geolocation.clearWatch(watchIdRastreamento);
    watchIdRastreamento = null;
  }
  rastreamentoAtivo = false;
  localStorage.removeItem('rastreamentoAtivo');

  // Marca como inativo no Firebase (mas mantém última posição)
  if (firebaseInitialized && firebaseDb && usuarioLogado?.id) {
    firebaseDb.ref('rastreamento/' + usuarioLogado.id + '/ativo').set(false)
      .catch(() => {});
  }
  if (usuarioLogado) addTracking('RASTREIO_OFF', `${usuarioLogado.nome} desativou localização`);
  mostrarToast('Localização desativada', 'ok');
  refreshHome();
}

// 💾 SALVAR LÍDER (com hash, validação, edição)
// =====================
async function saveLider(e) {
  e.preventDefault();
  if (usuarioLogado.role !== 'admin') {
    mostrarToast('Apenas admin', 'err');
    return;
  }

  // Validar CPF
  const cpfLider = document.getElementById('lider-cpf').value;
  if (!validarCPF(cpfLider)) {
    mostrarToast('CPF inválido', 'err');
    return;
  }
  // Bloquear duplicidade
  const idEditando = document.getElementById('lider-id-edit')?.value || null;
  if (cpfDuplicadoLider(cpfLider, idEditando)) {
    mostrarToast('Já existe líder com esse CPF', 'err');
    return;
  }

  // Senha: hash. Em modo edição, mantém senha antiga se vazia.
  const senhaTxt = document.getElementById('lider-senha').value;
  let senhaHash;
  if (idEditando && !senhaTxt) {
    const lAntigo = DB.getLiders()[idEditando];
    senhaHash = lAntigo?.senhaHash;
  } else if (senhaTxt) {
    senhaHash = await hashSenha(senhaTxt);
  } else {
    mostrarToast('Senha obrigatória', 'err');
    return;
  }

  // Comprimir foto
  let fotoFinal = null;
  if (fotoAtual) {
    try { fotoFinal = await comprimirFoto(fotoAtual); }
    catch { fotoFinal = fotoAtual; }
  } else if (idEditando) {
    fotoFinal = DB.getLiders()[idEditando]?.foto || null;
  }

  const lider = {
    nome: document.getElementById('lider-nome').value,
    cpf: limparCPF(cpfLider),
    tel: document.getElementById('lider-tel').value,
    bairro: document.getElementById('lider-bairro').value,
    profissao: document.getElementById('lider-profissao').value,
    titulo_eleitoral: document.getElementById('lider-titulo').value || '',
    lat: document.getElementById('lider-lat').value || null,
    lng: document.getElementById('lider-lng').value || null,
    foto: fotoFinal,
    senhaHash: senhaHash,
    meta: parseInt(document.getElementById('lider-meta')?.value) || 0,
    timestamp: idEditando ? (DB.getLiders()[idEditando]?.timestamp || new Date().toISOString()) : new Date().toISOString()
  };

  const lideres = DB.getLiders();
  const id = idEditando || ('lider_' + Date.now());
  lideres[id] = lider;
  DB.saveLiders(lideres);

  addTracking(idEditando ? 'EDITOU_LIDER' : 'NOVO_LIDER', `${usuarioLogado.nome} ${idEditando ? 'editou' : 'cadastrou'} ${lider.nome}`);
  mostrarToast(idEditando ? 'Líder atualizado!' : 'Líder cadastrado!', 'ok');

  e.target.reset();
  fotoAtual = null;
  if (document.getElementById('lider-id-edit')) document.getElementById('lider-id-edit').value = '';
  closeModal('m-lider');
  if (typeof showLideres === 'function') showLideres();
}

// 💾 SALVAR APOIADOR (com LGPD, validação, edição)

    mostrarToast('Apoiador com esse CPF já está cadastrado', 'err');
    return;
  }

  // Voto estadual obrigatório
  const votoEstEl = document.querySelector('input[name="ap-voto-estadual"]:checked');
  if (!votoEstEl) {
    mostrarToast('Selecione se apoiaria Magda como Deputada Estadual', 'err');

    mostrarToast('É necessário o consentimento do apoiador (LGPD)', 'err');

  };

  const apoiadores = DB.getApoiadores();
  const id = idEditando || ('apoiador_' + Date.now());

  // Notificação sonora pro Admin (somente em novos cadastros)
  if (!idEditando && usuarioLogado.role !== 'admin') tocarBipe();

  addTracking(idEditando ? 'EDITOU_APOIADOR' : 'NOVO_APOIADOR', `${usuarioLogado.nome} ${idEditando ? 'editou' : 'cadastrou'} ${apoiador.nome}`);

function exportarCSV(tipo) {
  let dados, headers, filename;
  if (tipo === 'apoiadores') {
    dados = Object.values(DB.getApoiadores());
    headers = ['nome','cpf','tel','bairro','rua','profissao','titulo_eleitoral','voto','deputado_estadual','deputado_federal','senador_1','senador_2','governador','cadastradoPor','timestamp'];
    filename = `apoiadores-${new Date().toISOString().slice(0,10)}.csv`;
  } else {
    dados = Object.values(DB.getLiders());
    headers = ['nome','cpf','tel','bairro','profissao','titulo_eleitoral','meta','timestamp'];
    filename = `lideres-${new Date().toISOString().slice(0,10)}.csv`;
  }
  let csv = '﻿' + headers.join(';') + '\n'; // BOM pra Excel reconhecer UTF-8
  dados.forEach(d => {
    csv += headers.map(h => {
      let v = d[h] === null || d[h] === undefined ? '' : String(d[h]);
      v = v.replace(/"/g, '""');
      if (v.includes(';') || v.includes('"') || v.includes('\n')) v = `"${v}"`;
      return v;
    }).join(';') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  mostrarToast('CSV exportado!', 'ok');
}

function exportarBackupJSON() {
  const backup = {
    versao: 'v4.5',
    geradoEm: new Date().toISOString(),
    lideres: DB.getLiders(),
    apoiadores: DB.getApoiadores(),
    pausas: DB.getPausas()
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `backup-magda-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  mostrarToast('Backup gerado!', 'ok');
}

function restaurarBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.lideres && !backup.apoiadores) { mostrarToast('Arquivo inválido', 'err'); return; }
      if (!confirm(`Restaurar backup de ${backup.geradoEm ? new Date(backup.geradoEm).toLocaleString('pt-BR') : 'data desconhecida'}?\nIsso vai substituir os dados atuais.`)) return;
      if (backup.lideres) DB.saveLiders(backup.lideres);
      if (backup.apoiadores) DB.saveApoiadores(backup.apoiadores);
      if (backup.pausas) DB.savePausas(backup.pausas);
      mostrarToast('Backup restaurado com sucesso!', 'ok');
      setTimeout(() => showConfiguracoes(), 800);
    } catch (err) {
      mostrarToast('Erro ao ler o arquivo: ' + err.message, 'err');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// =====================
// 🔔 NOTIFICAÇÃO SONORA
// =====================
function tocarBipe() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch {}
}

// =====================
// 📍 GPS → BAIRRO AUTOMÁTICO (Nominatim)
// =====================
async function preencherBairroPorGPS(latId, lngId, bairroId) {
  const lat = document.getElementById(latId).value;
  const lng = document.getElementById(lngId).value;
  if (!lat || !lng) return;
  const bairroEl = document.getElementById(bairroId);
  if (bairroEl && !bairroEl.value) {
    const bairro = await buscarBairroPorGPS(lat, lng);
    if (bairro) {
      bairroEl.value = bairro;
      mostrarToast('Bairro preenchido pelo GPS', 'ok');
    }
  }
}

function exportPDF() {
  // Abre modal de filtros. Admin pode filtrar por período/bairro/líder.
  const sel = document.getElementById('pdf-lider');
  if (sel) {
    sel.innerHTML = '<option value="">Todos os líderes</option>';
    const lid = DB.getLiders();
    for (const id in lid) {
      sel.innerHTML += `<option value="${lid[id].nome}">${lid[id].nome}</option>`;
    }
  }
  // Limpa campos
  ['pdf-data-ini','pdf-data-fim','pdf-bairro'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  openModal('m-pdf-filtro');
}

function gerarPDFFiltrado(e) {
  if (e) e.preventDefault();
  closeModal('m-pdf-filtro');

  const dataIni = document.getElementById('pdf-data-ini')?.value;
  const dataFim = document.getElementById('pdf-data-fim')?.value;
  const bairroF = (document.getElementById('pdf-bairro')?.value || '').toLowerCase().trim();
  const liderF  = document.getElementById('pdf-lider')?.value || '';

  // Filtrar apoiadores conforme critérios
  let apList = Object.values(DB.getApoiadores());
  if (dataIni) {
    const di = new Date(dataIni + 'T00:00:00');
    apList = apList.filter(a => new Date(a.timestamp) >= di);
  }
  if (dataFim) {
    const df = new Date(dataFim + 'T23:59:59');
    apList = apList.filter(a => new Date(a.timestamp) <= df);
  }
  if (bairroF) apList = apList.filter(a => (a.bairro || '').toLowerCase().includes(bairroF));
  if (liderF)  apList = apList.filter(a => a.cadastradoPor === liderF);

  // Chama o gerador real do PDF passando a lista filtrada
  gerarPDFRelatorio(apList, { dataIni, dataFim, bairroF, liderF });
}

function gerarPDFRelatorio(apList, filtros) {
  try {
    const lideres = DB.getLiders();
    const totalLideres = Object.keys(lideres).length;
    const totalApoiadores = apList.length;
    const magda = apList.filter(a => a.voto === 'sim').length;
    const outros = apList.filter(a => a.voto === 'nao').length;
    const pendentes = totalApoiadores - magda - outros;

    const total = totalApoiadores || 1;
    const pctMagda  = Math.round((magda   / total) * 100);
    const pctOutros = Math.round((outros  / total) * 100);
    const pctPend   = Math.max(0, 100 - pctMagda - pctOutros);

    function arc(startPct, endPct, rOuter, rInner, cx, cy) {
      const a1 = (startPct / 100) * 2 * Math.PI - Math.PI / 2;
      const a2 = (endPct   / 100) * 2 * Math.PI - Math.PI / 2;
      const x1 = cx + rOuter * Math.cos(a1), y1 = cy + rOuter * Math.sin(a1);
      const x2 = cx + rOuter * Math.cos(a2), y2 = cy + rOuter * Math.sin(a2);
      const x3 = cx + rInner * Math.cos(a2), y3 = cy + rInner * Math.sin(a2);
      const x4 = cx + rInner * Math.cos(a1), y4 = cy + rInner * Math.sin(a1);
      const largeArc = (endPct - startPct) > 50 ? 1 : 0;
      return `M ${x1} ${y1} A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${largeArc} 0 ${x4} ${y4} Z`;
    }

    const cx = 200, cy = 180, rOuter = 130, rInner = 78;
    const pathMagda  = arc(0, pctMagda, rOuter, rInner, cx, cy);
    const pathOutros = arc(pctMagda, pctMagda + pctOutros, rOuter, rInner, cx, cy);
    const pathPend   = arc(pctMagda + pctOutros, 100, rOuter, rInner, cx, cy);

    const dataAtual = new Date().toLocaleDateString('pt-BR') + ' às ' +
                      new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    // Linha de filtros aplicados
    const filtrosTxt = [];
    if (filtros?.dataIni) filtrosTxt.push(`Desde: ${filtros.dataIni.split('-').reverse().join('/')}`);
    if (filtros?.dataFim) filtrosTxt.push(`Até: ${filtros.dataFim.split('-').reverse().join('/')}`);
    if (filtros?.bairroF) filtrosTxt.push(`Bairro: ${filtros.bairroF}`);
    if (filtros?.liderF)  filtrosTxt.push(`Líder: ${filtros.liderF}`);
    const filtrosHTML = filtrosTxt.length > 0
      ? `<p style="color:rgba(255,255,255,0.85);margin:6px 0 0 0;font-size:12px"><strong>Filtros:</strong> ${filtrosTxt.join(' • ')}</p>`
      : '';

    const relatorioHTML = `
<div id="pdf-relatorio" style="background: linear-gradient(135deg, #003d82 0%, #004d9d 100%); min-height: 1100px; padding: 30px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 800px;">
  <div style="max-width: 760px; margin: 0 auto;">
    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 28px;">
      <div style="width: 90px; height: 90px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 6px; flex-shrink: 0;">
        <img src="${LOGO_MAGDA}" alt="Magda Paixão" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
      </div>
      <div style="flex: 1;">
        <h1 style="color: white; margin: 0; font-size: 30px; font-weight: bold;">Relatório de Intenção de Voto</h1>
        <p style="color: rgba(255,255,255,0.85); margin: 6px 0 0 0; font-size: 14px;">Magda Paixão — Boa Vista / RR</p>
        <p style="color: rgba(255,255,255,0.7); margin: 4px 0 0 0; font-size: 12px;">Gerado em ${dataAtual}</p>
        ${filtrosHTML}
      </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;">
      <div style="background: white; border-radius: 12px; padding: 18px 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
        <p style="color: #666; font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 0 0 6px 0;">Líderes</p>
        <p style="color: #1d7e3f; font-size: 38px; font-weight: bold; margin: 0;">${totalLideres}</p>
      </div>
      <div style="background: white; border-radius: 12px; padding: 18px 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
        <p style="color: #666; font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 0 0 6px 0;">Apoiadores</p>
        <p style="color: #ffd700; font-size: 38px; font-weight: bold; margin: 0;">${totalApoiadores}</p>
      </div>
      <div style="background: white; border-radius: 12px; padding: 18px 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
        <p style="color: #666; font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 0 0 6px 0;">Outros</p>
        <p style="color: #003d82; font-size: 38px; font-weight: bold; margin: 0;">${outros}</p>
      </div>
      <div style="background: #1d7e3f; border-radius: 12px; padding: 18px 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
        <p style="color: rgba(255,255,255,0.85); font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 0 0 6px 0;">Total Magda</p>
        <p style="color: #ffd700; font-size: 38px; font-weight: bold; margin: 0;">${magda}</p>
      </div>
    </div>

    <div style="background: white; border-radius: 16px; padding: 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.2);">
      <h2 style="color: #003d82; margin: 0 0 20px 0; font-size: 22px; font-weight: bold;">Distribuição de Intenção de Voto</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center;">
        <div style="position: relative; height: 320px;">
          <svg viewBox="0 0 400 360" style="width: 100%; height: 100%;">
            <ellipse cx="200" cy="320" rx="130" ry="14" fill="rgba(0,0,0,0.1)"></ellipse>
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ffd700"/><stop offset="100%" style="stop-color:#ffb700"/></linearGradient>
              <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1d7e3f"/><stop offset="100%" style="stop-color:#145a2f"/></linearGradient>
              <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#003d82"/><stop offset="100%" style="stop-color:#002a5a"/></linearGradient>
            </defs>
            ${pctMagda  > 0 ? `<path d="${pathMagda}"  fill="url(#grad1)" stroke="white" stroke-width="3"/>` : ''}
            ${pctOutros > 0 ? `<path d="${pathOutros}" fill="url(#grad2)" stroke="white" stroke-width="3"/>` : ''}
            ${pctPend   > 0 ? `<path d="${pathPend}"   fill="url(#grad3)" stroke="white" stroke-width="3"/>` : ''}
            <text x="200" y="175" text-anchor="middle" font-size="14" fill="#666" font-weight="600">Total</text>
            <text x="200" y="200" text-anchor="middle" font-size="28" fill="#003d82" font-weight="bold">${totalApoiadores}</text>
          </svg>
        </div>
        <div style="display: flex; flex-direction: column; gap: 14px;">
          <div style="background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.05)); border-left: 4px solid #ffd700; padding: 14px; border-radius: 8px;">
            <h3 style="color: #003d82; margin: 0; font-size: 15px;">Magda Paixão</h3>
            <span style="display: block; font-size: 26px; font-weight: bold; color: #ffd700; margin: 4px 0;">${pctMagda}%</span>
            <span style="color: #666; font-size: 12px;">${magda} apoiadores confirmados</span>
          </div>
          <div style="background: linear-gradient(135deg, rgba(29,126,63,0.12), rgba(29,126,63,0.05)); border-left: 4px solid #1d7e3f; padding: 14px; border-radius: 8px;">
            <h3 style="color: #003d82; margin: 0; font-size: 15px;">Outros Candidatos</h3>
            <span style="display: block; font-size: 26px; font-weight: bold; color: #1d7e3f; margin: 4px 0;">${pctOutros}%</span>
            <span style="color: #666; font-size: 12px;">${outros} eleitores em outros</span>
          </div>
          <div style="background: linear-gradient(135deg, rgba(0,61,130,0.12), rgba(0,61,130,0.05)); border-left: 4px solid #003d82; padding: 14px; border-radius: 8px;">
            <h3 style="color: #003d82; margin: 0; font-size: 15px;">Não Sabe / Pendente</h3>
            <span style="display: block; font-size: 26px; font-weight: bold; color: #003d82; margin: 4px 0;">${pctPend}%</span>
            <span style="color: #666; font-size: 12px;">${pendentes} indecisos</span>
          </div>
        </div>
      </div>
      <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
        <p style="color: #666; font-size: 12px; margin: 0; line-height: 1.6;">
          <strong style="color: #003d82;">Resumo:</strong> Relatório gerado pelo sistema Magda Paixão.
          ${totalLideres} líderes na base e ${totalApoiadores} apoiadores ${filtrosTxt.length ? 'no recorte' : 'cadastrados'}, sendo ${magda} declarando voto em Magda Paixão.
        </p>
      </div>
    </div>
  </div>
</div>`;

    const container = document.createElement('div');
    container.style.position = 'fixed';
    container.style.left = '-9999px';
    container.style.top = '0';
    container.innerHTML = relatorioHTML;
    document.body.appendChild(container);

    mostrarToast('Gerando PDF... aguarde', 'ok');

    const opt = {
      margin: 0,
      filename: `relatorio-magda-${new Date().toISOString().slice(0,10)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false, backgroundColor: '#003d82' },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(container.querySelector('#pdf-relatorio')).save().then(() => {
      document.body.removeChild(container);
      mostrarToast('PDF gerado!', 'ok');
    }).catch(err => {
      console.error('Erro PDF:', err);
      document.body.removeChild(container);
      mostrarToast('Erro ao gerar PDF', 'err');
    });
  } catch (err) {
    console.error('Erro gerarPDFRelatorio:', err);
    mostrarToast('Erro: ' + err.message, 'err');
  }
}

    document.body.classList.add('dark-mode');

  }

  ['login-cpf', 'lider-cpf', 'ap-cpf'].forEach(id => {

  });
  ['lider-tel', 'ap-tel'].forEach(id => {
    const el = document.getElementById(id); if (el) aplicarMascaraTel(el);
  });

  const user = JSON.parse(localStorage.getItem('usuarioLogado') || 'null');

    usuarioLogado = user;
    document.getElementById('auth').classList.remove('on');

});

// 📱 PWA / SERVICE WORKER
// =====================
if ('serviceWorker' in navigator) {
  // Service worker minimalista via Blob (sem precisar de arquivo .js separado)
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {});
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
